name: Cache Unity Library
description: Restore and save Unity Library cache

inputs:
  project-path:
    description: Path to Unity project
    required: true

  unity-version:
    description: Unity version
    required: true

runs:
  using: composite
  steps:
    - name: Cache Unity Library
      uses: actions/cache@v5
      with:
        path: ${{ inputs.project-path }}/Library
        key: Library-${{ runner.os }}-${{ inputs.unity-version }}-${{
          hashFiles(format('{0}/ProjectSettings/ProjectVersion.txt',
          inputs.project-path), format('{0}/Packages/manifest.json',
          inputs.project-path), format('{0}/Packages/packages-lock.json',
          inputs.project-path)) }}
        restore-keys: |
          Library-${{ runner.os }}-${{ inputs.unity-version }}-
          Library-${{ runner.os }}-
