name: Aggressive cleanup
description: Free disk space on GitHub-hosted runner

runs:
  using: composite
  steps:
    - name: Disk space before cleanup
      shell: bash
      run: |
        echo "Disk space before cleanup:"
        df -h

    - name: Remove language and toolchain directories
      shell: bash
      run: |
        echo "Removing Java..."
        sudo rm -rf /usr/lib/jvm
        echo "Removing .NET SDKs and runtimes..."
        sudo rm -rf /usr/share/dotnet
        echo "Removing Swift..."
        sudo rm -rf /usr/share/swift
        echo "Removing Haskell..."
        sudo rm -rf /usr/local/.ghcup
        echo "Removing Julia..."
        sudo rm -rf /usr/local/julia*
        echo "Removing Android SDK..."
        sudo rm -rf /usr/local/lib/android
        echo "Removing Azure CLI..."
        sudo rm -rf /opt/az
        echo "Removing PowerShell..."
        sudo rm -rf /usr/local/share/powershell
        echo "Removing hosted tool cache..."
        sudo rm -rf /opt/hostedtoolcache

    - name: Remove browsers
      shell: bash
      run: |
        echo "Removing Chromium..."
        sudo rm -rf /usr/local/share/chromium
        echo "Removing Microsoft Edge..."
        sudo rm -rf /opt/microsoft
        echo "Removing Google Chrome..."
        sudo rm -rf /opt/google
        echo "Removing Firefox..."
        sudo rm -rf /usr/lib/firefox

    - name: Prune Docker system
      shell: bash
      run: |
        echo "Cleaning Docker unused state..."
        docker system prune -af || true
        docker builder prune -af || true

    - name: Disk space after cleanup
      shell: bash
      run: |
        echo "Disk space after cleanup:"
        df -h
