name: Unity WebGL Build

permissions:
  contents: read

concurrency:
  group: unity-webgl-build-${{ github.ref }}-${{ inputs.build_type }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        type: choice
        options:
          - development
          - production
          - both
        default: development

env:
  PROJECT_PATH: Ladybug.Unity
  UNITY_VERSION: 6000.0.54f1
  BUILD_METHOD: CollectiveMind.Ladybug.Editor.Builder.Build
  BUILDS_PATH: artifacts

jobs:
  build-dev:
    name: Build development
    if: ${{ inputs.build_type == 'development' || inputs.build_type == 'both' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Cleanup runner
        uses: ./.github/actions/cleanup

      - name: Cache Unity Library
        uses: ./.github/actions/cache-unity-library
        with:
          project-path: ${{ env.PROJECT_PATH }}
          unity-version: ${{ env.UNITY_VERSION }}

      - name: Set build timestamp
        run: echo "BUILD_TIMESTAMP=$(date +'%y.%m.%d-%H.%M.%S')" >> $GITHUB_ENV

      - name: Build Development
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: ${{ env.PROJECT_PATH }}
          unityVersion: ${{ env.UNITY_VERSION }}
          targetPlatform: WebGL
          buildName: Ladybug.GitHub.Dev-${{ env.BUILD_TIMESTAMP }}
          buildsPath: ${{ env.BUILDS_PATH }}
          buildMethod: ${{ env.BUILD_METHOD }}
          customParameters: -development

      - name: Upload Dev Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Ladybug.GitHub.Dev-${{ env.BUILD_TIMESTAMP }}
          path: artifacts/WebGL/Ladybug.GitHub.Dev-${{ env.BUILD_TIMESTAMP }}
          if-no-files-found: error

  build-prod:
    name: Build production
    if: ${{ inputs.build_type == 'production' || inputs.build_type == 'both' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Cleanup runner
        uses: ./.github/actions/cleanup

      - name: Cache Unity Library
        uses: ./.github/actions/cache-unity-library
        with:
          project-path: ${{ env.PROJECT_PATH }}
          unity-version: ${{ env.UNITY_VERSION }}

      - name: Set build timestamp
        run: echo "BUILD_TIMESTAMP=$(date +'%y.%m.%d-%H.%M.%S')" >> $GITHUB_ENV

      - name: Build Production
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: ${{ env.PROJECT_PATH }}
          unityVersion: ${{ env.UNITY_VERSION }}
          targetPlatform: WebGL
          buildName: Ladybug.GitHub.Prod-${{ env.BUILD_TIMESTAMP }}
          buildsPath: ${{ env.BUILDS_PATH }}
          buildMethod: ${{ env.BUILD_METHOD }}

      - name: Upload Prod Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Ladybug.GitHub.Prod-${{ env.BUILD_TIMESTAMP }}
          path: artifacts/WebGL/Ladybug.GitHub.Prod-${{ env.BUILD_TIMESTAMP }}
          if-no-files-found: error
